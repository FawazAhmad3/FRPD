<!-- section-featured-research.html -->
<section class="py-20 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-10 sm:mb-16">
            <h2 class="text-2xl sm:text-4xl font-heading font-bold text-brand-dark mb-4">{{title}}</h2>
            <p class="text-gray-500 max-w-2xl mx-auto text-base sm:text-lg">{{summary}}</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Research Card 1 -->
            <div class="group relative bg-[#f8fafc] rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 cursor-pointer" 
                 onclick="window.openResearchModal('{{res1_id}}')">
                <div class="aspect-[16/10] overflow-hidden">
                    <img src="{{res1_image}}" alt="{{res1_title}}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700">
                </div>
                <div class="p-6">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="px-2 py-0.5 bg-brand-accent/10 text-brand-accent text-[10px] font-bold rounded-full uppercase">{{res1_category}}</span>
                    </div>
                    <h3 class="text-lg font-heading font-bold text-brand-dark group-hover:text-brand-accent transition-colors">{{res1_title}}</h3>
                </div>
            </div>

            <!-- Research Card 2 -->
            <div class="group relative bg-[#f8fafc] rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 cursor-pointer" 
                 onclick="window.openResearchModal('{{res2_id}}')">
                <div class="aspect-[16/10] overflow-hidden">
                    <img src="{{res2_image}}" alt="{{res2_title}}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700">
                </div>
                <div class="p-6">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="px-2 py-0.5 bg-brand-accent/10 text-brand-accent text-[10px] font-bold rounded-full uppercase">{{res2_category}}</span>
                    </div>
                    <h3 class="text-lg font-heading font-bold text-brand-dark group-hover:text-brand-accent transition-colors">{{res2_title}}</h3>
                </div>
            </div>

            <!-- Research Card 3 -->
            <div class="group relative bg-[#f8fafc] rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 cursor-pointer" 
                 onclick="window.openResearchModal('{{res3_id}}')">
                <div class="aspect-[16/10] overflow-hidden">
                    <img src="{{res3_image}}" alt="{{res3_title}}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700">
                </div>
                <div class="p-6">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="px-2 py-0.5 bg-brand-accent/10 text-brand-accent text-[10px] font-bold rounded-full uppercase">{{res3_category}}</span>
                    </div>
                    <h3 class="text-lg font-heading font-bold text-brand-dark group-hover:text-brand-accent transition-colors">{{res3_title}}</h3>
                </div>
            </div>
        </div>

        <div class="text-center mt-12">
            <a href="/pages/research-wing.html" class="inline-flex items-center gap-2 text-brand-accent font-bold hover:gap-3 transition-all">
                Explore Research Wing
                <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>
    </div>
</section>
