<div id="pdf-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-brand-dark/80 backdrop-blur-sm transition-opacity"
        onclick="pdfHandler.closeModal()"></div>

    <!-- Modal Content -->
    <div class="relative bg-white w-11/12 max-w-5xl h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden transform transition-all scale-95 opacity-0"
        id="pdf-modal-content">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h3 class="text-lg font-heading font-bold text-brand-dark flex items-center" id="pdf-modal-title">
                <i class="fas fa-file-pdf text-red-500 mr-2 text-xl"></i> Document Preview
            </h3>
            <button onclick="pdfHandler.closeModal()"
                class="text-gray-400 hover:text-red-500 hover:bg-red-50 w-8 h-8 rounded-full transition-colors flex items-center justify-center focus:outline-none">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <!-- Viewer Container -->
        <div class="flex-grow bg-[#525659] relative">
            <!-- Loader -->
            <div id="pdf-modal-loader" class="absolute inset-0 flex flex-col items-center justify-center text-white/70">
                <div class="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin mb-4"></div>
                <p class="font-medium tracking-wide">Loading Document...</p>
            </div>

            <!-- iframe container -->
            <iframe id="pdf-iframe" class="w-full h-full relative z-10 hidden border-0 shadow-inner"
                onload="document.getElementById('pdf-modal-loader').classList.add('hidden'); this.classList.remove('hidden');"></iframe>
        </div>

        <!-- Footer actions -->
        <div class="bg-gray-50 px-6 py-3 border-t border-gray-200 flex justify-end">
            <a id="pdf-download-btn" href="#" download
                class="bg-brand-dark hover:bg-brand-light text-white px-5 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center">
                <i class="fas fa-download mr-2"></i> Download PDF
            </a>
        </div>
    </div>
</div>
