<div
  class="bg-gray-50 p-8 rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300"
>
  <div class="flex items-center gap-4 mb-6">
    <div
      class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-brand-accent"
    >
      <i class="fas fa-building text-lg"></i>
    </div>
    <h4 class="text-xl font-heading font-bold text-gray-900">{{name}}</h4>
  </div>

  <div class="space-y-4">
    <div
      class="flex items-center gap-4 text-sm group cursor-pointer border-t border-gray-50 pt-4"
    >
      <i class="fas fa-phone text-brand-accent w-5 text-center"></i>
      <span class="font-medium group-hover:text-brand-accent">{{phone}}</span>
    </div>
    <div
      class="flex items-center gap-4 text-sm group cursor-pointer border-t border-gray-50 pt-4"
    >
      <i class="fas fa-envelope text-brand-accent w-5 text-center"></i>
      <span class="font-medium group-hover:text-brand-accent">{{email}}</span>
    </div>
  </div>
</div>
