<div
    class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 transition-all duration-300 hover:shadow-xl hover:-translate-y-1">
    <div class="p-6">
        <div class="flex justify-between items-start mb-4">
            <h3 class="text-xl font-bold text-brand-dark font-heading leading-snug">{{title}}</h3>
            <span class="inline-block px-3 py-1 text-xs font-semibold rounded-full {{statusBadgeClass}} border">
                {{status}}
            </span>
        </div>
        <p class="text-gray-600 mb-6 text-sm leading-relaxed">{{description}}</p>
        <div class="flex justify-between items-center text-sm border-t border-gray-100 pt-4">
            <button
                class="text-brand-accent font-semibold hover:text-blue-700 transition flex items-center {{previewHidden}}"
                onclick="pdfHandler.preview('{{filePreview}}')">
                <i class="fas fa-file-pdf mr-2"></i> Preview Document
            </button>
            <a href="{{fileDownload}}"
                class="text-gray-400 hover:text-brand-dark transition text-lg bg-gray-50 p-2 rounded-full hover:bg-gray-200 {{downloadHidden}}"
                download aria-label="Download Document">
                <i class="fas fa-download"></i>
            </a>
        </div>
    </div>
</div>
