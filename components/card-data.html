<div onclick="window.openDataModal('{{id}}')" class="bg-white rounded-2xl shadow-sm border border-gray-100 hover:shadow-2xl transition-all duration-300 overflow-hidden flex flex-col h-full group animate__animated animate__fadeInUp hover:-translate-y-2 hover:scale-[1.02] z-10 hover:z-30 cursor-pointer">
    <!-- Icon & Badge Bar -->
    <div class="p-6 pb-0 flex justify-between items-start">
        <div class="w-12 h-12 rounded-xl bg-brand-gray flex items-center justify-center text-brand-accent text-xl group-hover:bg-brand-accent group-hover:text-white transition-all duration-300">
            <i class="{{icon}}"></i>
        </div>
        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider {{accessClass}}">
            {{access}}
        </span>
    </div>

    <!-- Content -->
    <div class="p-6 flex flex-col flex-grow relative">
        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">{{category}}</span>
        <h3 class="text-lg font-heading font-bold text-brand-dark mb-2 leading-tight group-hover:text-brand-accent transition-colors">
            {{title}}
        </h3>

        <!-- Interactive Preview (Visible for Dashboards) -->
        <div id="preview-{{id}}" class="dashboard-preview hidden mb-4 p-3 bg-gray-50 rounded-xl border border-gray-100 overflow-hidden h-24 relative">
            <div id="chart-mini-{{id}}" class="w-full h-full"></div>
            <!-- Pulse indicator -->
            <div class="absolute top-2 right-2 flex items-center gap-1.5">
                <span class="flex h-1.5 w-1.5 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-green-500"></span>
                </span>
                <span class="text-[7px] font-bold text-green-600 uppercase tracking-tighter">Live</span>
            </div>
        </div>
        
        <div class="flex-grow overflow-hidden">
            <p class="text-gray-500 text-sm mb-4 line-clamp-3">
                {{description}}
            </p>
        </div>

        <!-- Meta Footer -->
        <div class="mt-auto flex items-center justify-between pt-4 border-t border-gray-50">
            <div class="flex items-center text-[10px] font-bold text-gray-400 uppercase">
                <i class="fas fa-file-invoice mr-2"></i>
                <span>Format: {{format}}</span>
            </div>
            <a href="{{url}}" target="_blank" rel="noopener noreferrer" class="text-brand-accent hover:text-blue-700 transition-colors">
                <i class="fas fa-circle-arrow-down text-xl"></i>
            </a>
        </div>
    </div>
</div>
