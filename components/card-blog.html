<div
    class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 transition-all duration-300 hover:shadow-xl hover:-translate-y-1 flex flex-col h-full">
    <div class="h-48 bg-brand-light overflow-hidden img-hover-zoom relative">
        <img src="{{image}}" alt="{{title}}" class="w-full h-full object-cover">
        <div
            class="absolute top-4 left-4 bg-white/90 backdrop-blur text-brand-dark text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">
            {{category}}
        </div>
    </div>
    <div class="p-6 flex flex-col flex-grow">
        <h3 class="text-xl font-bold text-brand-dark mb-3 font-heading leading-snug">{{title}}</h3>
        <p class="text-gray-600 text-sm mb-6 flex-grow">{{summary}}</p>
        <div class="flex items-center justify-between border-t border-gray-100 pt-4">
            <span class="text-xs text-gray-500 font-medium"><i
                    class="far fa-calendar-alt mr-1.5 text-brand-accent"></i>{{date}}</span>
            <a href="/pages/blog-detail.html?id={{id}}"
                class="text-brand-accent font-semibold text-sm hover:text-brand-dark transition flex items-center"
                data-i18n="btn_read_more">
                Read More <i class="fas fa-arrow-right text-xs ml-1.5"></i>
            </a>
        </div>
    </div>
</div>
