<div class="flex-shrink-0 w-[280px] flex flex-col h-full group cursor-pointer animate__animated animate__fadeInUp bg-white border border-gray-100 rounded-lg overflow-hidden hover:shadow-lg transition-all duration-300" onclick="window.openCourseModal('{{id}}')">
    <!-- Image -->
    <div class="relative aspect-video overflow-hidden bg-gray-100">
        <img src="{{image}}" alt="{{title}}" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors"></div>
    </div>

    <!-- Content -->
    <div class="p-4 flex flex-col flex-grow">
        <h3 class="text-sm font-bold text-gray-900 mb-1 line-clamp-2 leading-snug group-hover:text-brand-accent transition-colors">
            {{title}}
        </h3>
        <p class="text-[11px] text-gray-500 mb-1 leading-tight">{{instructor}}</p>
        
        <!-- Badge -->
        <div class="mb-1 {{badgeVisibility}}">
            <span class="inline-block px-2 py-0.5 bg-[#eceb98] text-[#3d3c0a] text-[10px] font-bold rounded-sm uppercase tracking-tight">
                {{badge}}
            </span>
        </div>

        <!-- Rating -->
        <div class="flex items-center gap-1 mb-2">
            <span class="text-xs font-bold text-[#b4690e]">{{rating}}</span>
            <div class="flex text-[8px] text-[#b4690e]">
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star-half-alt"></i>
            </div>
            <span class="text-[10px] text-gray-400">({{reviewsCount}})</span>
        </div>

        <!-- Price -->
        <div class="mt-auto flex items-center gap-2">
            <span class="text-base font-bold text-gray-900">{{price}} PKR</span>
            <span class="text-xs text-gray-400 line-through">{{oldPrice}} PKR</span>
        </div>
    </div>
</div>
