<!-- [CLEAN REDESIGN] section-contact.html -->
<section class="bg-white">
    <!-- Main Contact Cards -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Card: Phone -->
            <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group">
                <div class="w-14 h-14 bg-blue-50 rounded-xl flex items-center justify-center text-brand-accent mb-6 group-hover:bg-brand-accent group-hover:text-white transition-all">
                    <i class="fas fa-phone-alt text-xl"></i>
                </div>
                <h4 class="text-xl font-heading font-bold text-gray-900 mb-3">Phone</h4>
                <p id="contact-phone" class="text-gray-600 font-medium">0092 344 9198158</p>
                <p class="text-xs text-brand-accent mt-2 font-bold tracking-widest uppercase">Call us anytime</p>
            </div>

            <!-- Card: Email -->
            <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group">
                <div class="w-14 h-14 bg-blue-50 rounded-xl flex items-center justify-center text-brand-accent mb-6 group-hover:bg-brand-accent group-hover:text-white transition-all">
                    <i class="fas fa-envelope text-xl"></i>
                </div>
                <h4 class="text-xl font-heading font-bold text-gray-900 mb-3">Email</h4>
                <a href="mailto:info@frpd.pk" id="contact-email" class="text-gray-600 font-medium hover:text-brand-accent">info@frpd.pk</a>
                <p class="text-xs text-brand-accent mt-2 font-bold tracking-widest uppercase">Support 24/7</p>
            </div>

            <!-- Card: Address -->
            <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group lg:col-span-1">
                <div class="w-14 h-14 bg-blue-50 rounded-xl flex items-center justify-center text-brand-accent mb-6 group-hover:bg-brand-accent group-hover:text-white transition-all">
                    <i class="fas fa-map-marker-alt text-xl"></i>
                </div>
                <h4 class="text-xl font-heading font-bold text-gray-900 mb-3">Location</h4>
                <p id="contact-address" class="text-gray-600 font-medium leading-relaxed">CDA Headworks Road, Barakahu, Islamabad</p>
            </div>

            <!-- Card: Work Hours -->
            <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group">
                <div class="w-14 h-14 bg-blue-50 rounded-xl flex items-center justify-center text-brand-accent mb-6 group-hover:bg-brand-accent group-hover:text-white transition-all">
                    <i class="fas fa-clock text-xl"></i>
                </div>
                <h4 class="text-xl font-heading font-bold text-gray-900 mb-3">Work Hours</h4>
                <p id="contact-hours" class="text-gray-600 font-medium">Mon - Fri: 9 AM - 5 PM</p>
                <p class="text-xs text-brand-accent mt-2 font-bold tracking-widest uppercase">Weekend Closed</p>
            </div>
        </div>

        <!-- NEW: Departmental Contacts Section -->
        <div class="mt-24">
            <div class="text-center mb-16">
                <span class="text-brand-accent font-bold tracking-[0.3em] uppercase text-xs block mb-4">Direct Lines</span>
                <h2 class="text-4xl font-heading font-bold text-gray-900 italic">Departmental Contacts</h2>
                <div class="w-20 h-1 bg-brand-accent mx-auto mt-6 rounded-full"></div>
            </div>
            
            <div id="departments-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Departments dynamically injected from contact-en.json -->
            </div>
        </div>
    </div>
    </div>

    <!-- Map Section (Reduced Size) -->
    <div class="bg-brand-gray pb-20">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-[2rem] overflow-hidden shadow-xl border border-white">
                <div class="h-[400px] relative">
                    <iframe 
                        id="contact-map"
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13271.6022359489!2d73.1812!3d33.7389!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x38dfbf848c1a9333%3A0xe549cd97b0a7c9f!2sCDA%20Head%20Works%20Rd%2C%20Islamabad!5e0!3m2!1sen!2spk!4v1713250000000!5m2!1sen!2spk" 
                        width="100%" 
                        height="100%" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        class="absolute inset-0 grayscale hover:grayscale-0 transition-all duration-1000">
                    </iframe>
                </div>
            </div>
        </div>
    </div>
</section>
