<!-- 
  ===========================================
  [INDEX PAGE HERO COMPONENT]
  ===========================================
  Role: Pure image slider loop consuming viewport without overlaid UI text grids.
-->
<div class="relative w-full pt-4 lg:pt-6">
    <div id="hero-wrapper"
        class="relative w-full h-[400px] md:h-[450px] lg:h-[550px] bg-brand-dark overflow-hidden bg-gray-900 group">

        <img src="/assets/images/sample1.jpg"
            class="absolute inset-0 w-full h-full object-cover transition-all duration-[1500ms] ease-out opacity-100 scale-100 slide-img"
            alt="Slide 1" />
        <img src="/assets/images/sample2.jpg"
            class="absolute inset-0 w-full h-full object-cover transition-all duration-[1500ms] ease-out opacity-0 scale-105 slide-img"
            alt="Slide 2" />
        <img src="/assets/images/sample3.jpg"
            class="absolute inset-0 w-full h-full object-cover transition-all duration-[1500ms] ease-out opacity-0 scale-105 slide-img"
            alt="Slide 3" />

        <div class="absolute inset-0 bg-black/10 z-0 pointer-events-none"></div>

        <!-- Navigation Overlay -->
        <button id="hero-prev"
            class="absolute left-4 md:left-8 top-1/2 -translate-y-1/2 text-gray-800/80 hover:text-black flex items-center justify-center transition-all z-20 hover:scale-110 drop-shadow-md">
            <i class="fas fa-angle-left text-5xl md:text-7xl font-bold"></i>
        </button>
        <button id="hero-next"
            class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 text-gray-800/80 hover:text-black flex items-center justify-center transition-all z-20 hover:scale-110 drop-shadow-md">
            <i class="fas fa-angle-right text-5xl md:text-7xl font-bold"></i>
        </button>

        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex space-x-3 z-20" id="hero-dots"></div>

        <script>
            (function () {
                const slides = document.querySelectorAll('.slide-img');
                const dotsContainer = document.getElementById('hero-dots');
                if (slides.length <= 1) return;

                slides.forEach((_, i) => {
                    const dot = document.createElement('button');
                    dot.className = `w-3 h-3 rounded-full transition-all cursor-pointer shadow-lg ${i === 0 ? 'bg-white scale-125' : 'bg-white/40'}`;
                    dot.onclick = () => goToSlide(i);
                    dotsContainer.appendChild(dot);
                });

                let currentSlide = 0;
                let slideInterval;

                function goToSlide(index) {
                    if (!slides[currentSlide]) return;
                    slides[currentSlide].classList.replace('opacity-100', 'opacity-0');
                    slides[currentSlide].classList.replace('scale-100', 'scale-105');
                    
                    if (dotsContainer.children[currentSlide]) dotsContainer.children[currentSlide].className = 'w-3 h-3 rounded-full transition-all bg-white/40 shadow-lg';

                    currentSlide = index;

                    if (slides[currentSlide]) {
                        slides[currentSlide].classList.replace('opacity-0', 'opacity-100');
                        slides[currentSlide].classList.replace('scale-105', 'scale-100');
                    }
                    if (dotsContainer.children[currentSlide]) dotsContainer.children[currentSlide].className = 'w-3 h-3 rounded-full transition-all bg-white scale-125 shadow-lg';

                    resetTimer();
                }

                function nextSlide() { goToSlide((currentSlide + 1) % slides.length); }
                function prevSlide() { goToSlide((currentSlide - 1 + slides.length) % slides.length); }

                function resetTimer() {
                    clearInterval(slideInterval);
                    slideInterval = setInterval(nextSlide, 4000);
                }

                document.getElementById('hero-next').onclick = nextSlide;
                document.getElementById('hero-prev').onclick = prevSlide;

                resetTimer();
            })();
        </script>
    </div>
    <!-- Ribbon attached to the bottom of the hero -->
    <div class="w-full text-center py-2.5 px-4" style="background-color: #0f1729;">
        <p class="text-[#c75e2b] text-xs md:text-sm font-bold uppercase tracking-widest">
            Organization in special consultative status with the economic and social council since 2022
        </p>
    </div>
</div>
