<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_training">FRPD - Training & Courses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#0f172a', light: '#1e293b', accent: '#3b82f6', white: '#f8fafc', gray: '#f1f5f9' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } };
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body class="bg-brand-gray text-gray-900 font-sans antialiased text-base flex flex-col min-h-screen">
    <div id="navbar-placeholder"></div>

    <div class="bg-brand-dark py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl font-heading font-bold text-white mb-4" data-i18n="nav_training">Training & Courses</h1>
            <p class="text-gray-400 max-w-2xl mx-auto">Enhance your professional capabilities with our specialized
                training regimens.</p>
        </div>
    </div>

    <main class="flex-grow py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-24">
            
            <!-- Training -->
            <section id="trainings" class="scroll-mt-32">
                <div class="mb-6 border-b border-gray-200 pb-2">
                    <h2 class="text-3xl font-heading font-bold text-brand-dark" data-i18n="nav_training_other">Training</h2>
                </div>
                <div id="trainings-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <p class="text-gray-500 italic">Training events loading...</p>
                </div>
            </section>
            
            <!-- Online Courses -->
            <section id="online-courses" class="scroll-mt-32">
                <div class="mb-6 border-b border-gray-200 pb-2">
                    <h2 class="text-3xl font-heading font-bold text-brand-dark" data-i18n="nav_online_courses">Online courses</h2>
                </div>
                <div id="online-courses-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Courses injected via JSON -->
                    <p class="text-gray-500 italic">Courses loading...</p>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <div id="modal-placeholder"></div>
    <div id="social-buttons-placeholder"></div>

    <script src="/utils/helpers.js"></script>
    <script src="/js/loadComponents.js"></script>
    <script src="/js/languageSwitcher.js"></script>
    <script src="/js/dataLoader.js"></script>
    <script src="/js/pdfHandler.js"></script>
    <script src="/js/socialAutoPost.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
