<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_blog">FRPD - Blog & Publications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#0f172a', light: '#1e293b', accent: '#3b82f6', white: '#f8fafc', gray: '#f1f5f9' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } };
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body class="bg-brand-gray text-gray-900 font-sans antialiased text-base flex flex-col min-h-screen">
    <div id="navbar-placeholder"></div>

    <div class="bg-brand-dark py-20 bg-opacity-90">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-5xl font-heading font-extrabold text-white tracking-wide mb-6" data-i18n="nav_blog">Blog &
                Publications</h1>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto">Latest insights, academic articles, and comprehensive
                research posts curated by experts.</p>
        </div>
    </div>

    <main class="flex-grow py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div id="all-blogs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <!-- Blogs injected via JSON DataLoader -->
                <p class="col-span-full text-center text-gray-500 py-10">Loading publications...</p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <div id="modal-placeholder"></div>
    <div id="social-buttons-placeholder"></div>

    <script src="/utils/helpers.js"></script>
    <script src="/js/loadComponents.js"></script>
    <script src="/js/languageSwitcher.js"></script>
    <script src="/js/dataLoader.js"></script>
    <script src="/js/pdfHandler.js"></script>
    <script src="/js/socialAutoPost.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
