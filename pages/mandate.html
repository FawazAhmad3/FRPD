<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="nav_mandate">FRPD - Mandate</title>
    <link rel="icon" type="image/jpeg" href="../assets/icons/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                dark: "#0f172a",
                light: "#1e293b",
                accent: "#3b82f6",
                white: "#f8fafc",
                gray: "#f1f5f9",
              },
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              heading: ["Outfit", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="../styles/main.css" />
  </head>

  <body
    class="bg-brand-gray text-gray-900 font-sans antialiased text-base flex flex-col min-h-screen"
  >
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
      <!-- Page Header -->
      <section class="bg-brand-dark py-20 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10">
          <div
            class="absolute inset-0 bg-gradient-to-r from-brand-accent to-transparent"
          ></div>
        </div>
        <div
          class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center"
        >
          <h1
            class="text-5xl font-heading font-bold text-white mb-6 animate__animated animate__fadeInDown"
            data-i18n="nav_mandate"
          >
            Mandate
          </h1>
          <p
            class="text-gray-400 max-w-2xl mx-auto text-lg leading-relaxed animate__animated animate__fadeInUp"
          >
            Our compass for driving change. Explore the vision, mission, and
            strategic approach that define FRPD.
          </p>
        </div>
      </section>

      <!-- Mandate Sections Placeholder -->
      <div id="section-mandate-placeholder"></div>
    </main>

    <div id="footer-placeholder"></div>
    <div id="social-buttons-placeholder"></div>

    <script src="../utils/helpers.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="../js/languageSwitcher.js"></script>
    <script src="../js/dataLoader.js"></script>
    <script src="../js/main.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const checkInit = setInterval(() => {
          if (window.initMandatePage) {
            window.initMandatePage();
            clearInterval(checkInit);
          }
        }, 100);
      });
    </script>
  </body>
</html>
