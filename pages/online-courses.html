<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_online_courses">FRPD - Executive Online Programs</title>
    <link rel="icon" type="image/jpeg" href="../assets/icons/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#0f172a', light: '#1e293b', accent: '#3b82f6', white: '#f8fafc', gray: '#f1f5f9' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .course-tab.active {
            color: #0f172a;
            border-bottom: 2px solid #0f172a;
            font-weight: 700;
        }
        .course-tab {
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
        }
        .course-tab:hover {
            color: #0f172a;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }
    </style>
</head>

<body class="bg-white text-gray-900 font-sans antialiased text-base flex flex-col min-h-screen">
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
        <!-- Premium Banner -->
        <section class="bg-white pt-20 pb-12">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <h1 id="hero-title" class="text-3xl md:text-4xl font-bold text-gray-900 mb-4 animate__animated animate__fadeIn">
                    Skills to transform your career and life
                </h1>
                <p id="hero-description" class="text-gray-600 text-lg max-w-3xl animate__animated animate__fadeIn animate__delay-1s">
                    From critical skills to technical topics, FRPD supports your professional development.
                </p>
            </div>
        </section>

        <!-- Category Tabs -->
        <section class="border-b border-gray-200 sticky top-0 bg-white z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div id="category-tabs" class="flex gap-8 overflow-x-auto no-scrollbar py-4">
                    <!-- Tabs injected here -->
                </div>
            </div>
        </section>

        <!-- Dynamic Content Area -->
        <section class="py-12 bg-white">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div id="selected-category-info" class="mb-8 animate__animated animate__fadeIn">
                    <h2 id="cat-display-name" class="text-2xl font-bold text-gray-900 mb-2">Category Name</h2>
                    <p id="cat-display-desc" class="text-gray-600 max-w-4xl">Category description goes here.</p>
                </div>

                <!-- Scrollable Container with Arrows -->
                <div class="relative group">
                    <!-- Left Arrow -->
                    <button id="scroll-left-btn" onclick="scrollGrid('left')" class="absolute -left-4 top-1/2 -translate-y-1/2 z-10 w-10 h-10 bg-white shadow-xl rounded-full flex items-center justify-center text-brand-dark hover:bg-brand-accent hover:text-white transition-all border border-gray-100" style="display: none;">
                        <i class="fas fa-chevron-left"></i>
                    </button>

                    <div id="courses-grid-container" class="flex overflow-x-auto gap-6 pb-8 no-scrollbar scroll-smooth">
                        <!-- Cards injected here -->
                        <div class="w-full py-20 text-center text-gray-400">
                            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-brand-accent"></i>
                            <p>Loading your potential...</p>
                        </div>
                    </div>

                    <!-- Right Arrow -->
                    <button id="scroll-right-btn" onclick="scrollGrid('right')" class="absolute -right-4 top-1/2 -translate-y-1/2 z-10 w-10 h-10 bg-white shadow-xl rounded-full flex items-center justify-center text-brand-dark hover:bg-brand-accent hover:text-white transition-all border border-gray-100">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                

            </div>
        </section>

        <!-- Modal Placeholder -->
        <div id="course-modal-placeholder"></div>
    </main>

    <div id="footer-placeholder"></div>
    <div id="social-buttons-placeholder"></div>

    <!-- Core Scripts -->
    <script src="../utils/helpers.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="../js/languageSwitcher.js"></script>
    <script src="../js/dataLoader.js"></script>
    <script src="../js/main.js"></script>
    
    <!-- Redesigned Logic -->
    <script>
        let onlineProgramData = null;
        let activeCategoryId = null;

        async function initRedesignedOnlinePrograms() {
            const lang = window.currentLang || "en";
            const dataPath = `/data/online-programs.json`;
            const data = await fetchJSON(dataPath);
            
            if (!data || !data[lang]) return;
            onlineProgramData = data[lang];

            // Render Tabs
            renderTabs();
            
            // Set "All Courses" as active by default
            switchCategory('all');

            // Load Modal Template
            const modalPlaceholder = document.getElementById("course-modal-placeholder");
            if (modalPlaceholder) {
                const modalRes = await fetch("/components/modal-course.html");
                if (modalRes.ok) modalPlaceholder.innerHTML = await modalRes.text();
            }
        }

        function renderTabs() {
            const container = document.getElementById('category-tabs');
            if (!container) return;

            let tabsHtml = `
                <div onclick="switchCategory('all')" id="tab-all" class="course-tab text-gray-500 font-bold text-sm pb-2 active">
                    All Courses
                </div>
            `;

            tabsHtml += onlineProgramData.categories.map(cat => `
                <div onclick="switchCategory('${cat.id}')" id="tab-${cat.id}" class="course-tab text-gray-500 font-bold text-sm pb-2">
                    ${cat.name}
                </div>
            `).join('');

            container.innerHTML = tabsHtml;
        }

        async function switchCategory(id) {
            activeCategoryId = id;
            
            // Update Tabs UI
            document.querySelectorAll('.course-tab').forEach(tab => tab.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${id}`);
            if (activeTab) activeTab.classList.add('active');

            let coursesToRender = [];
            let catName = "";
            let catDesc = "";

            if (id === 'all') {
                coursesToRender = onlineProgramData.categories.flatMap(c => c.courses);
                catName = "All Executive Programs";
                catDesc = "Discover our complete range of certified professional courses across AI, Data Science, Web Development, and more.";
            } else {
                const category = onlineProgramData.categories.find(c => c.id === id);
                if (!category) return;
                coursesToRender = category.courses;
                catName = category.name;
                catDesc = category.description;
            }

            // Update Category Info
            document.getElementById('cat-display-name').innerText = catName;
            document.getElementById('cat-display-desc').innerText = catDesc;

            // Render Cards
            await renderCourseCards(coursesToRender);
        }

        function scrollGrid(direction) {
            const container = document.getElementById('courses-grid-container');
            if (!container) return;
            const scrollAmount = 300;
            if (direction === 'left') {
                container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else {
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
            // Logic handled by scroll listener
        }

        function updateScrollButtons() {
            const container = document.getElementById('courses-grid-container');
            const leftBtn = document.getElementById('scroll-left-btn');
            const rightBtn = document.getElementById('scroll-right-btn');
            if (!container || !leftBtn || !rightBtn) return;

            const scrollLeft = container.scrollLeft;
            const scrollWidth = container.scrollWidth;
            const clientWidth = container.clientWidth;

            // Hide left button if at start
            leftBtn.style.display = scrollLeft <= 0 ? 'none' : 'flex';
            
            // Hide right button if at end (with 1px buffer for subpixel issues)
            rightBtn.style.display = (scrollLeft + clientWidth >= scrollWidth - 1) ? 'none' : 'flex';
        }

        async function renderCourseCards(courses) {
            const container = document.getElementById('courses-grid-container');
            if (!container) return;

            // Attach scroll listener once
            if (!container.dataset.listenerAttached) {
                container.addEventListener('scroll', updateScrollButtons);
                window.addEventListener('resize', updateScrollButtons);
                container.dataset.listenerAttached = "true";
            }

            const templateRes = await fetch("/components/card-course.html");
            if (!templateRes.ok) return;
            const templateHtml = await templateRes.text();

            let htmlContent = "";
            courses.forEach(item => {
                let card = templateHtml;
                for (const key in item) {
                    const regex = new RegExp(`{{${key}}}`, "g");
                    card = card.replace(regex, item[key] || "");
                }
                htmlContent += card;
            });

            container.innerHTML = htmlContent;
            
            // Initial button check after content injection
            setTimeout(updateScrollButtons, 100);
        }

        // Global functions for modal interaction (if needed by cards)
        window.openCourseModal = function(id) {
            const allCourses = onlineProgramData.categories.flatMap(c => c.courses);
            const item = allCourses.find(c => c.id === id);
            if (!item) return;

            const modal = document.getElementById("course-modal");
            if (!modal) return;

            // Simple binding for minimal modal (as per existing dataLoader.js logic)
            if (document.getElementById("modal-title")) 
                document.getElementById("modal-title").innerText = item.title;
            if (document.getElementById("modal-price")) 
                document.getElementById("modal-price").innerText = `${item.price} PKR`;
            if (document.getElementById("modal-account-number")) 
                document.getElementById("modal-account-number").innerText = "0344 9198158";
            if (document.getElementById("modal-description")) 
                document.getElementById("modal-description").innerText = item.title + " by " + item.instructor + ". Duration: " + (item.duration || "Self-paced");
            
            // Show Modal
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            document.body.style.overflow = "hidden";
        };

        window.closeCourseModal = function() {
            const modal = document.getElementById("course-modal");
            if (modal) {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
                document.body.style.overflow = "";
            }
        };

        document.addEventListener('DOMContentLoaded', initRedesignedOnlinePrograms);
    </script>
</body>

</html>
