<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_capacity_building">FRPD - Capacity Building Programs</title>
    <link rel="icon" type="image/jpeg" href="../assets/icons/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#0f172a', light: '#1e293b', accent: '#3b82f6', white: '#f8fafc', gray: '#f1f5f9' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="../styles/main.css">
</head>

<body class="bg-brand-gray text-gray-900 font-sans antialiased text-base flex flex-col min-h-screen">
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
        <!-- Page Header -->
        <section class="bg-brand-dark py-24 relative overflow-hidden">
            <div class="absolute inset-0 opacity-20">
                <div class="absolute top-0 right-0 w-96 h-96 bg-brand-accent rounded-full blur-3xl translate-x-1/2 -translate-y-1/2"></div>
                <div class="absolute bottom-0 left-0 w-96 h-96 bg-blue-600 rounded-full blur-3xl -translate-x-1/2 translate-y-1/2"></div>
            </div>
            
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                <div class="text-center">
                    <span class="inline-block px-4 py-1.5 bg-brand-accent/20 text-brand-accent text-sm font-bold uppercase tracking-widest rounded-full mb-6 animate__animated animate__fadeInDown">
                        Professional Development
                    </span>
                    <h1 id="hero-title" class="text-4xl md:text-6xl font-heading font-bold text-white mb-6 animate__animated animate__fadeInUp">
                        Capacity Building Programs
                    </h1>
                    <p id="hero-description" class="text-gray-400 max-w-2xl mx-auto text-lg leading-relaxed animate__animated animate__fadeInUp animate__delay-1s">
                        Empowering professionals and institutions through multidisciplinary training, strategic development, and innovative policy frameworks.
                    </p>
                </div>
            </div>
        </section>

        <!-- Dynamic Content Container -->
        <div id="capacity-building-container">
            <!-- Program Categories will be injected here -->
            <div class="py-20 text-center text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-brand-accent"></i>
                <p>Establishing program curriculum...</p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <div id="social-buttons-placeholder"></div>

    <!-- Core Scripts -->
    <script src="../utils/helpers.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="../js/languageSwitcher.js"></script>
    <script src="../js/dataLoader.js"></script>
    <script src="../js/main.js"></script>
    
    <!-- Page Initialization -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkDataLoad = setInterval(() => {
                if (window.initCapacityBuildingPage) {
                    window.initCapacityBuildingPage();
                    clearInterval(checkDataLoad);
                }
            }, 100);
        });
    </script>
</body>

</html>
