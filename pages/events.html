<!-- 
  ===========================================
  [EVENTS PAGES ENGINE]
  ===========================================
  Role: Structural layout housing all upcoming and historic webinars.
  Dependencies:
  - Operates almost exclusively through `<div id="events-container">`.
  - Driven strictly via logic arrays inside `data/events.json` married directly onto `card-event.html`.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_events">FRPD - Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#0f172a', light: '#1e293b', accent: '#3b82f6', white: '#f8fafc', gray: '#f1f5f9' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } };
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body class="bg-brand-gray text-gray-900 font-sans antialiased text-base flex flex-col min-h-screen">
    <div id="navbar-placeholder"></div>

    <div class="bg-brand-dark py-20 relative">
        <!-- Optional pattern background -->
        <div class="absolute inset-x-0 bottom-0 h-1 bg-brand-accent"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
            <h1 class="text-5xl font-heading font-extrabold text-white tracking-wide mb-6" data-i18n="nav_events">Events
                & Webinars</h1>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto">Join our upcoming conferences, policy talks, and
                interactive webinars globally.</p>
        </div>
    </div>

    <main class="flex-grow py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div id="events-container" class="space-y-10 max-w-5xl mx-auto">

                <!-- Events generated dynamically by dataLoader.js from data/events.json -->

            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <div id="modal-placeholder"></div>
    <div id="social-buttons-placeholder"></div>

    <script src="/utils/helpers.js"></script>
    <script src="/js/loadComponents.js"></script>
    <script src="/js/languageSwitcher.js"></script>
    <script src="/js/dataLoader.js"></script>
    <script src="/js/pdfHandler.js"></script>
    <script src="/js/socialAutoPost.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
