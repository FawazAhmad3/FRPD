<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_publications">FRPD - Publications</title>
    <link rel="icon" type="image/jpeg" href="../assets/icons/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#0f172a', light: '#1e293b', accent: '#3b82f6', white: '#f8fafc', gray: '#f1f5f9' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="../styles/main.css">
</head>

<body class="bg-brand-gray text-gray-900 font-sans antialiased text-base flex flex-col min-h-screen">
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
        <!-- Page Header -->
        <section class="bg-brand-dark py-24 relative overflow-hidden">
            <div class="absolute inset-0 opacity-20">
                <div class="absolute -top-24 -right-24 w-96 h-96 bg-brand-accent rounded-full blur-3xl opacity-50"></div>
                <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-blue-900 rounded-full blur-3xl opacity-30"></div>
            </div>
            
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
                <span class="inline-block px-4 py-1.5 bg-brand-accent/20 text-brand-accent text-xs font-bold uppercase tracking-widest rounded-full mb-6 animate__animated animate__fadeInDown">
                    Knowledge Repository
                </span>
                <h1 id="hero-title" class="text-4xl md:text-6xl font-heading font-bold text-white mb-6 animate__animated animate__fadeInUp">
                    Publications
                </h1>
                <p id="hero-description" class="text-gray-400 max-w-2xl mx-auto text-lg leading-relaxed animate__animated animate__fadeInUp animate__delay-1s">
                    Access our high-impact reports, detailed policy briefs, and peer-reviewed research articles shaping global development policy.
                </p>
            </div>
        </section>

        <!-- Filter Bar -->
        <section class="sticky top-28 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 py-6">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-wrap justify-center gap-3" id="publication-filters">
                    <button onclick="window.filterPublications('All')" class="pub-filter-btn active px-5 py-2 rounded-full border border-gray-200 bg-white text-xs font-bold uppercase tracking-widest text-brand-dark hover:border-brand-accent hover:text-brand-accent transition-all shadow-sm">
                        All Works
                    </button>
                    <button onclick="window.filterPublications('Report')" class="pub-filter-btn px-5 py-2 rounded-full border border-gray-200 bg-white text-xs font-bold uppercase tracking-widest text-brand-dark hover:border-brand-accent hover:text-brand-accent transition-all shadow-sm">
                        Reports
                    </button>
                    <button onclick="window.filterPublications('Policy Brief')" class="pub-filter-btn px-5 py-2 rounded-full border border-gray-200 bg-white text-xs font-bold uppercase tracking-widest text-brand-dark hover:border-brand-accent hover:text-brand-accent transition-all shadow-sm">
                        Policy Briefs
                    </button>
                    <button onclick="window.filterPublications('Article')" class="pub-filter-btn px-5 py-2 rounded-full border border-gray-200 bg-white text-xs font-bold uppercase tracking-widest text-brand-dark hover:border-brand-accent hover:text-brand-accent transition-all shadow-sm">
                        Research Articles
                    </button>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <section class="py-20 bg-gray-50/50 min-h-[600px]">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div id="publications-grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Dynamic Publication Cards will be injected here -->
                    <div class="col-span-full py-20 text-center text-gray-400">
                        <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-brand-accent"></i>
                        <p class="font-medium">Curating our latest research...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <div id="social-buttons-placeholder"></div>

    <!-- Core Scripts -->
    <script src="../utils/helpers.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="../js/languageSwitcher.js"></script>
    <script src="../js/dataLoader.js"></script>
    <script src="../js/main.js"></script>
    
    <!-- Page Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Wait for dataLoader to be ready
            const checkLoader = setInterval(() => {
                if (window.initPublicationsPage) {
                    window.initPublicationsPage();
                    clearInterval(checkLoader);
                }
            }, 100);
        });
    </script>
</body>

</html>
