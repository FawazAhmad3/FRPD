<!-- 
  ===========================================
  [INDEX ENTRY ROUTE]
  ===========================================
  Role: Primary landing page displaying featured database aggregates.
  Dependencies:
  - Hooks specifically to `dataLoader.js` using IDs like `#latest-blogs-container` to automatically inject cards.
  - Mounts `<div id="hero-placeholder"></div>` which sequentially invokes the video banner layout logic inside `main.js`.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="home_title">FRPD - Firm of Research, Policy and Development</title>
    <link rel="icon" type="image/jpeg" href="assets/icons/logo.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a', /* Dark Blue */
                            light: '#1e293b',
                            accent: '#3b82f6', /* Blue Accent */
                            white: '#f8fafc',
                            gray: '#f1f5f9'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/main.css">
</head>

<body class="bg-brand-gray text-gray-900 font-sans antialiased text-base flex flex-col min-h-screen">
    <!-- Navbar Component -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main class="flex-grow">
        <!-- Hero Component -->
        <div id="hero-placeholder"></div>

        <!-- About Section Placeholder -->
        <div id="section-about-placeholder"></div>

        <!-- Stats Section Placeholder -->
        <div id="section-stats-placeholder"></div>

        <!-- Featured Research Section -->
        <div id="section-featured-research-placeholder"></div>

        <!-- Upcoming Training Section -->
        <div id="section-training-header-placeholder"></div>






    </main>

    <!-- Footer Component -->
    <div id="footer-placeholder"></div>

    <!-- Modals from Javascript -->
    <div id="research-modal-placeholder"></div>
    <div id="modal-placeholder"></div>
    <div id="social-buttons-placeholder"></div>

    <!-- Core Scripts -->
    <script src="utils/helpers.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/languageSwitcher.js"></script>
    <script src="js/dataLoader.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
